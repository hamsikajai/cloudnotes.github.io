<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cloud Notes</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <h1 class="logo">☁️ Cloud Notes</h1>

      <div class="sidebar">

  <button class="nav-btn active" onclick="showPage('dashboard')">🏠 Dashboard</button>
  <button class="nav-btn" onclick="showPage('calendar')">📅 Calendar</button>
  <button class="nav-btn" onclick="showPage('tasks')">✅ Tasks</button>
  <button class="nav-btn" onclick="showPage('notes')">📝 Notes</button>
  <button class="nav-btn" onclick="showPage('habits')">💖 Habits</button>
  <button class="nav-btn" onclick="showPage('goals')">🎯 Goals</button>

</div>
      <button onclick="toggleTheme()" class="nav-btn">🎨 Theme</button>
      <div class="bottom">
        <button class="nav-btn">⚙ Settings</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
<div id="dashboard" class="page">🏠 Dashboard content here</div>

<div id="calendar" class="page">📅 Calendar coming soon</div>

<div id="tasks" class="page">
  <h2>Tasks</h2>

  <div class="task-input">
    <input id="taskInput" placeholder="Add a task..." />
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>
</div>

<div id="notes" class="page">📝 Notes area</div>

<div id="habits" class="page">💖 Habits tracker</div>

<div id="goals" class="page">🎯 Goals section</div>
      <header class="topbar">
        <h2 id="greeting">Good Morning 🌷</h2>
        <p id="date"></p>
      </header>

      <section class="grid">

       <div class="card">
  <h3>🌷 Today's Tasks</h3>

  <div class="task-input">
    <input id="taskInput" placeholder="Add a new task..." />
    <button onclick="addTask()">Add</button>
  </div>
<div class="bar">
    <div class="fill"></div>
</div>

<p id="progressText">🌸 Add your first task!</p>
  <ul id="taskList"></ul>
</div>

        <div class="card">
          <h3>📈 Progress</h3>
          <div class="bar">
            <div class="fill"></div>
          </div>
          <p id="progressText">0%</p>
        </div>

        <div class="card">
          <h3>💖 Quote</h3>
          <p>"Small progress every day adds up."</p>
        </div>

        <div class="card">
          <h3>📝 Notes</h3>
          <textarea placeholder="Write something..."></textarea>
        </div>

      </section>

    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
